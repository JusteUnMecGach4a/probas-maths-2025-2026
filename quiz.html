<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS - Entraînement Aléatoire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="main.js" defer></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <div id="nav-placeholder"></div>

    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="bg-white dark:bg-slate-900 p-6 md:p-10 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800">
            
            <div id="quiz-container">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-xl font-black text-blue-600 uppercase tracking-wider">Session Aléatoire</h1>
                    <span id="progress-text" class="text-sm font-bold bg-blue-100 dark:bg-blue-900/40 text-blue-600 px-3 py-1 rounded-full"></span>
                </div>

                <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full mb-8">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>

                <div id="question-box">
                    <p id="q-text" class="text-lg md:text-xl font-bold mb-8 leading-tight min-h-[80px]"></p>
                    <div id="opts" class="grid gap-3"></div>

                    <div id="explanation-box" class="hidden mt-8 p-6 rounded-2xl border-2 animate-in fade-in duration-500">
                        <p id="fb-status" class="font-black text-lg mb-2"></p>
                        <div id="fb-text" class="text-slate-600 dark:text-slate-300 italic text-sm md:text-base"></div>
                    </div>

                    <button id="next-btn" class="hidden mt-8 w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl shadow-lg transition transform active:scale-95">
                        Question suivante ➜
                    </button>
                </div>
            </div>

            <div id="result-screen" class="hidden text-center py-10">
                <div class="text-6xl mb-6">📊</div>
                <h2 class="text-3xl font-black mb-2">Résultat de la série</h2>
                <p class="text-slate-500 dark:text-slate-400 text-lg mb-8">Score : <span id="final-score" class="text-blue-600 font-bold"></span></p>
                <button onclick="location.reload()" class="px-10 py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition">
                    Nouvelle série (20 questions)
                </button>
            </div>
        </div>
    </main>

    <script>
        // BANQUE DE 30 QUESTIONS
        const questionPool = [
            // BASES (8)
            { q: "Si \\( P(A)=0,2 \\) et \\( P(B)=0,5 \\) et qu'ils sont incompatibles, que vaut \\( P(A \\cup B) \\) ?", options: ["0,7", "0,1", "0,3"], correct: 0, exp: "Incompatibles => \\( P(A \\cap B) = 0 \\). Donc \\( P(A \\cup B) = 0,2 + 0,5 = 0,7 \\)." },
            { q: "Un événement certain a une probabilité de :", options: ["0", "0,5", "1"], correct: 2, exp: "Par définition, la probabilité d'un événement certain est 1 (100%)." },
            { q: "Que vaut \\( P(\\bar{A}) \\) si \\( P(A)=0,05 \\) ?", options: ["0,95", "0,5", "0,05"], correct: 0, exp: "\\( 1 - 0,05 = 0,95 \\)." },
            { q: "Si \\( P(A \\cup B) = 0,8 \\), \\( P(A)=0,5 \\) et \\( P(B)=0,4 \\), que vaut \\( P(A \\cap B) \\) ?", options: ["0,1", "0,9", "0,2"], correct: 0, exp: "\\( P(A \\cap B) = P(A) + P(B) - P(A \\cup B) = 0,5 + 0,4 - 0,8 = 0,1 \\)." },
            { q: "La probabilité d'un événement impossible est :", options: ["-1", "0", "1"], correct: 1, exp: "Un événement qui ne peut pas se produire a une probabilité de 0." },
            { q: "L'univers \\( \\Omega \\) est l'ensemble de toutes les issues. On a toujours \\( P(\\Omega) = \\) ?", options: ["0", "0,5", "1"], correct: 2, exp: "L'univers représente la totalité des chances, donc sa probabilité est 1." },
            { q: "Si \\( A \\) et \\( B \\) sont contraires, alors \\( P(A) + P(B) = \\) ?", options: ["0", "1", "0,5"], correct: 1, exp: "Deux événements contraires complètent l'univers, leur somme est 1." },
            { q: "On tire une carte. \\( P(\\text{As}) = 4/32 \\). Quelle est la probabilité de NE PAS tirer un As ?", options: ["28/32", "4/32", "1/32"], correct: 0, exp: "\\( 1 - 4/32 = 28/32 \\)." },

            // CONDITIONNELLES (8)
            { q: "Si \\( P(A \\cap B) = 0,1 \\) et \\( P(B) = 0,4 \\), calculer \\( P_B(A) \\) :", options: ["0,25", "0,04", "0,5"], correct: 0, exp: "\\( 0,1 / 0,4 = 1/4 = 0,25 \\)." },
            { q: "Si \\( A \\) et \\( B \\) sont indépendants, alors \\( P_B(A) = \\) ?", options: ["\\( P(B) \\)", "\\( P(A) \\)", "0"], correct: 1, exp: "L'indépendance signifie que B n'influence pas A." },
            { q: "Calculer \\( P(A \\cap B) \\) si \\( P(A) = 0,2 \\) et \\( P_A(B) = 0,7 \\) :", options: ["0,14", "0,9", "0,5"], correct: 0, exp: "\\( P(A) \\times P_A(B) = 0,2 \\times 0,7 = 0,14 \\)." },
            { q: "Dans un arbre, la somme des probabilités issues d'un même noeud vaut :", options: ["0", "1", "\\( P(A) \\)"], correct: 1, exp: "C'est la loi des noeuds : toutes les branches partant d'un point totalisent 1." },
            { q: "Si \\( P(A)=0,3 \\) et \\( P(B)=0,3 \\) et \\( P(A \\cap B)=0,09 \\), sont-ils indépendants ?", options: ["Oui", "Non", "On ne peut pas savoir"], correct: 0, exp: "\\( 0,3 \\times 0,3 = 0,09 \\). Comme \\( P(A)\\times P(B) = P(A \\cap B) \\), ils sont indépendants." },
            { q: "La formule de Bayes permet de calculer \\( P_A(B) \\) à partir de \\( P_B(A) \\). On a :", options: ["\\( P_A(B) = \\frac{P(B \\cap A)}{P(A)} \\)", "\\( P_A(B) = P(A) \\times P(B) \\)", "\\( P_A(B) = 1 \\)"], correct: 0, exp: "C'est la définition fondamentale des probabilités conditionnelles." },
            { q: "Si \\( P(B) = 0 \\), peut-on calculer \\( P_B(A) \\) ?", options: ["Oui", "Non", "Seulement si A=0"], correct: 1, exp: "On ne peut pas diviser par zéro, donc la probabilité conditionnelle n'existe pas si le 'sachant' est impossible." },
            { q: "Si \\( P_B(A) = 0,8 \\), que vaut \\( P_B(\\bar{A}) \\) ?", options: ["0,8", "0,2", "0"], correct: 1, exp: "Sachant B, les événements A et non-A sont toujours contraires, leur somme vaut 1." },

            // BINOMIALE (8)
            { q: "Une épreuve de Bernoulli a combien d'issues ?", options: ["1", "2", "10"], correct: 1, exp: "Succès ou Échec uniquement." },
            { q: "Le paramètre \\( n \\) de la loi binomiale représente :", options: ["Le succès", "Le nombre d'essais", "L'écart-type"], correct: 1, exp: "n est le nombre de répétitions indépendantes." },
            { q: "Quelle est l'espérance de \\( \\mathcal{B}(20 ; 0,5) \\) ?", options: ["10", "5", "20"], correct: 0, exp: "\\( 20 \\times 0,5 = 10 \\)." },
            { q: "Si \\( X \\sim \\mathcal{B}(n, p) \\), alors \\( P(X=0) = \\) ?", options: ["0", "\\( (1-p)^n \\)", "\\( p^n \\)"], correct: 1, exp: "Zéro succès signifie n échecs consécutifs." },
            { q: "Que vaut \\( \\binom{n}{n} \\) ?", options: ["0", "1", "n"], correct: 1, exp: "Il n'y a qu'une seule façon de choisir n éléments parmi n." },
            { q: "La loi binomiale nécessite que les épreuves soient :", options: ["Dépendantes", "Indépendantes", "Simultanées"], correct: 1, exp: "C'est la condition sine qua non pour multiplier les probabilités." },
            { q: "Si \\( E(X) = 4 \\) et \\( n = 10 \\), que vaut \\( p \\) ?", options: ["0,4", "2,5", "40"], correct: 0, exp: "\\( p = E(X) / n = 4 / 10 = 0,4 \\)." },
            { q: "L'écart-type est égal à :", options: ["\\( V(X) \\)", "\\( \\sqrt{V(X)} \\)", "\\( E(X) \\)"], correct: 1, exp: "C'est la définition générale de l'écart-type." },

            // POISSON (6)
            { q: "La loi de Poisson \\( \\mathcal{P}(\\lambda) \\) modélise les événements :", options: ["Fréquents", "Rares", "Certains"], correct: 1, exp: "On l'appelle la loi des événements rares." },
            { q: "Si \\( \\lambda = 2,5 \\), que vaut l'espérance ?", options: ["2,5", "5", "1,58"], correct: 0, exp: "Dans une loi de Poisson, \\( E(X) = \\lambda \\)." },
            { q: "On peut approcher \\( \\mathcal{B}(n, p) \\) par \\( \\mathcal{P}(\\lambda) \\) si \\( n \\ge 30 \\) et :", options: ["\\( p \\le 0,1 \\)", "\\( p \\ge 0,5 \\)", "\\( n < 10 \\)"], correct: 0, exp: "Il faut un grand échantillon et une petite probabilité." },
            { q: "Dans la formule de Poisson, que vaut \\( 0! \\) ?", options: ["0", "1", "Infini"], correct: 1, exp: "Par convention mathématique, factorielle zéro égale 1." },
            { q: "Si \\( \\lambda = 9 \\), que vaut l'écart-type ?", options: ["9", "81", "3"], correct: 2, exp: "\\( \\sigma = \\sqrt{\\lambda} = \\sqrt{9} = 3 \\)." },
            { q: "La loi de Poisson est une loi de probabilité :", options: ["Discrète", "Continue", "Inconnue"], correct: 0, exp: "Elle compte des nombres entiers (0, 1, 2...), elle est donc discrète." }
        ];

        let quizQuestions = [];
        let cur = 0, score = 0;

        // Fonction pour mélanger le tableau (Algorithme Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            // Mélanger et prendre les 20 premières questions
            quizQuestions = shuffle([...questionPool]).slice(0, 20);
            cur = 0; score = 0;
            load();
        }

        function load() {
            const q = quizQuestions[cur];
            
            document.getElementById('progress-text').innerText = `${cur + 1} / 20`;
            document.getElementById('progress-bar').style.width = ((cur + 1) / 20 * 100) + '%';
            document.getElementById('q-text').innerHTML = q.q;
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');

            const optDiv = document.getElementById('opts');
            optDiv.innerHTML = '';

            q.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all font-bold text-slate-700 dark:text-slate-300";
                b.innerHTML = o;
                b.onclick = () => check(i);
                optDiv.appendChild(b);
            });

            if(window.MathJax) MathJax.typesetPromise();
        }

        function check(idx) {
            const q = quizQuestions[cur];
            const isCorrect = (idx === q.correct);
            const expBox = document.getElementById('explanation-box');
            const status = document.getElementById('fb-status');
            const text = document.getElementById('fb-text');
            const btns = document.querySelectorAll('#opts button');

            if(isCorrect) score++;

            btns.forEach((btn, i) => {
                btn.disabled = true;
                if(i === q.correct) {
                    btn.classList.replace('border-slate-100', 'border-green-500');
                    btn.classList.add('bg-green-50', 'dark:bg-green-900/20', 'text-green-600');
                } else if(i === idx && !isCorrect) {
                    btn.classList.replace('border-slate-100', 'border-red-500');
                    btn.classList.add('bg-red-50', 'dark:bg-red-900/20', 'text-red-600');
                }
            });

            expBox.classList.remove('hidden');
            if(isCorrect) {
                status.innerText = "✅ Bien vu !";
                status.className = "font-black text-lg mb-2 text-green-600";
                expBox.className = "mt-8 p-6 rounded-2xl border-2 border-green-200 dark:border-green-800 bg-green-50/30 dark:bg-green-900/10";
            } else {
                status.innerText = "❌ Petite erreur...";
                status.className = "font-black text-lg mb-2 text-red-600";
                expBox.className = "mt-8 p-6 rounded-2xl border-2 border-red-200 dark:border-red-800 bg-red-50/30 dark:bg-red-900/10";
            }
            text.innerHTML = q.exp;

            document.getElementById('next-btn').classList.remove('hidden');
            if(window.MathJax) MathJax.typesetPromise();
        }

        document.getElementById('next-btn').onclick = () => {
            cur++;
            if(cur < 20) {
                load();
            } else {
                document.getElementById('quiz-container').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = `${score} / 20`;
            }
        };

        initQuiz();
    </script>
</body>
</html>
