<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="main.js" defer></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="nav-placeholder"></div>
    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl">
            <h1 class="text-3xl font-black text-center text-blue-600 mb-8">🎯 Quiz Interactif</h1>
            <div id="quiz-box">
                <p id="q-text" class="text-xl font-bold mb-6 min-h-[60px]"></p>
                <div id="opts" class="space-y-3"></div>
                <p id="fb" class="mt-6 text-center text-lg font-bold"></p>
                <button id="next" class="hidden mt-8 w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg">Question suivante ➜</button>
            </div>
        </div>
    </main>
    <script>
        const questions = [
            { q: "Calculer \\( P_B(A) \\) si \\( P(B)=0,5 \\) et \\( P(A \\cap B)=0,1 \\) :", options: ["0,05", "0,2", "0,4"], correct: 1 },
            { q: "Quelle est l'espérance de \\( \\mathcal{B}(100 ; 0,1) \\) ?", options: ["1", "10", "90"], correct: 1 },
            { q: "L'écart-type d'une loi \\( \\mathcal{P}(9) \\) est :", options: ["3", "9", "81"], correct: 0 },
            { q: "Si \\( P(A)=0,4 \\), que vaut \\( P(\\bar{A}) \\) ?", options: ["0,4", "0,6", "1,4"], correct: 1 }
        ];
        let cur = 0, score = 0;
        function load() {
            const q = questions[cur];
            document.getElementById('q-text').innerHTML = q.q;
            const optDiv = document.getElementById('opts'); optDiv.innerHTML = '';
            document.getElementById('fb').innerText = '';
            document.getElementById('next').classList.add('hidden');
            q.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 hover:border-blue-500 bg-slate-50 dark:bg-slate-800 transition font-bold";
                b.innerHTML = o;
                b.onclick = () => {
                    if(i === q.correct) { score++; document.getElementById('fb').innerText = "✅ Bravo !"; document.getElementById('fb').className="mt-6 text-center text-green-500 font-bold"; }
                    else { document.getElementById('fb').innerText = "❌ Faux."; document.getElementById('fb').className="mt-6 text-center text-red-500 font-bold"; }
                    document.querySelectorAll('#opts button').forEach(btn => btn.disabled = true);
                    document.getElementById('next').classList.remove('hidden');
                };
                optDiv.appendChild(b);
            });
            if(window.MathJax) MathJax.typesetPromise();
        }
        document.getElementById('next').onclick = () => { cur++; if(cur < questions.length) load(); else document.getElementById('quiz-box').innerHTML = `<div class="text-center"><h2 class="text-2xl font-bold">Terminé ! Score : ${score}/${questions.length}</h2><button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg">Recommencer</button></div>`; };
        load();
    </script>
</body>
</html>
