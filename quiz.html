<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BTS - Quiz Probabilités</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="conditionnelles.html">Probabilités Conditionnelles</a>
        <a href="binomiale.html">Loi Binomiale</a>
        <a href="quiz.html" class="active">Quiz</a>
    </nav>
    <div class="container">
        <h1>🎯 Testez-vous</h1>
        <div id="quiz-box">
            <p id="question-text" style="font-size: 1.2rem; min-height: 50px;"></p>
            <div id="options-container" style="display: flex; flex-direction: column; gap: 10px; margin: 20px 0;"></div>
            <p id="feedback"></p>
            <button id="next-btn" class="btn" style="display:none;">Question suivante</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Calculer \\( P_B(A) \\) si \\( P(B)=0,5 \\) et \\( P(A \\cap B)=0,1 \\) :", options: ["0,05", "0,2", "0,6"], correct: 1 },
            { q: "Quelle est l'espérance de la loi \\( \\mathcal{B}(20 ; 0,1) \\) ?", options: ["2", "18", "0,2"], correct: 0 },
            { q: "La formule de l'écart-type est :", options: ["\\( n \\times p \\)", "\\( \\sqrt{n p (1-p)} \\)", "\\( p^k \\)"], correct: 1 }
        ];
        
        let current = 0;
        let score = 0;

        function loadQ() {
            const q = questions[current];
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('next-btn').style.display = 'none';

            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.innerHTML = opt; // Utilisation de innerHTML pour le LaTeX
                b.className = "btn-opt";
                b.onclick = () => {
                    if(i === q.correct) { score++; document.getElementById('feedback').innerText = "Correct !"; }
                    else { document.getElementById('feedback').innerText = "Faux."; }
                    Array.from(container.children).forEach(btn => btn.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                };
                container.appendChild(b);
            });

            // Commande cruciale : demande à MathJax de retraiter le nouveau texte injecté
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        document.getElementById('next-btn').onclick = () => {
            current++;
            if(current < questions.length) loadQ();
            else document.getElementById('quiz-box').innerHTML = `<h3>Terminé ! Score : ${score}/${questions.length}</h3>`;
        };
        loadQ();
    </script>
</body>
</html>
