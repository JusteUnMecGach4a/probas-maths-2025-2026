<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS - Conditionnelles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="main.js" defer></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div id="nav-placeholder"></div>
    <main class="max-w-4xl mx-auto px-4 py-12">
        <h1 class="text-4xl font-black mb-8 border-b-4 border-blue-600 inline-block">Probabilités Conditionnelles</h1>
        <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm">
            <h2 class="text-2xl font-bold mb-4">Formule</h2>
            <div class="bg-blue-50 dark:bg-slate-800 p-6 rounded-xl text-center text-xl mb-6 border-l-8 border-blue-600">
                \[ P_{B}(A) = \frac{P(A \cap B)}{P(B)} \]
            </div>
            <h3 class="text-xl font-bold mb-4">Indépendance</h3>
            <p>Deux événements sont indépendants si et seulement si :</p>
            <p class="mt-4 p-4 bg-slate-100 dark:bg-slate-800 rounded-lg text-center font-bold">
                \[ P(A \cap B) = P(A) \times P(B) \]
            </p>
        </div>
    </main>
</body>
</html>
