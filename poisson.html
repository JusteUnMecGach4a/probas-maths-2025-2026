        <h1>3. Loi de Poisson \( \mathcal{P}(\lambda) \)</h1>
        <p>Modélise le nombre d'événements rares dans un temps donné.</p>
        <div class="formula">\[ P(X = k) = \frac{e^{-\lambda} \lambda^k}{k!} \]</div>
        <p>Approximation de la Binomiale par Poisson si \( n \ge 30 \) et \( p \le 0,1 \).</p>
