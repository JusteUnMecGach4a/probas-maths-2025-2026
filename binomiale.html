        <h1>2. Loi Binomiale \( \mathcal{B}(n, p) \)</h1>
        <p>Utilisée pour \( n \) répétitions indépendantes d'un succès \( p \).</p>
        <div class="formula">\[ P(X = k) = \binom{n}{k} p^k (1-p)^{n-k} \]</div>
        <ul><li>Espérance : \( E(X) = n \times p \)</li><li>Écart-type : \( \sigma(X) = \sqrt{n p (1-p)} \)</li></ul>
    </div>
