<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS - Quiz Interactif</title>
    <link rel="stylesheet" href="style.css">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="conditionnelles.html">Conditionnelles</a>
        <a href="binomiale.html">Loi Binomiale</a>
        <a href="quiz.html" class="active">Quiz</a>
    </nav>
    <div class="container">
        <h1 id="quiz-title">🎯 Quiz : Êtes-vous prêt ?</h1>
        <div id="quiz-box">
            <p id="progress" style="color: var(--primary); font-weight: bold;"></p>
            <p id="question-text" style="font-size: 1.2rem; min-height: 60px;"></p>
            <div id="options-container" style="display: flex; flex-direction: column;"></div>
            <p id="feedback" style="margin-top: 15px; font-weight: bold; font-style: italic;"></p>
            <button id="next-btn" class="btn" style="display:none; margin-top: 20px;">Continuer</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Si \\( P(B)=0,8 \\) et \\( P(A \\cap B)=0,4 \\), que vaut \\( P_B(A) \\) ?", options: ["0,5", "0,32", "2"], correct: 0 },
            { q: "La somme des probabilités de tous les événements élémentaires est égale à :", options: ["0", "0,5", "1"], correct: 2 },
            { q: "Dans une loi \\( \\mathcal{B}(10 ; 0,3) \\), l'espérance est :", options: ["10", "3", "0,3"], correct: 1 },
            { q: "Si \\( A \\) et \\( B \\) sont indépendants, alors \\( P(A \\cap B) = \\) ?", options: ["\\( P(A) + P(B) \\)", "\\( P(A) \\times P(B) \\)", "\\( P_B(A) \\)"], correct: 1 },
            { q: "Que représente \\( n \\) dans la loi binomiale ?", options: ["Le nombre de succès", "Le nombre d'essais", "La probabilité d'échec"], correct: 1 },
            { q: "L'événement contraire de \\( A \\) se note :", options: ["\\( \\bar{A} \\)", "\\( -A \\)", "\\( A^2 \\)"], correct: 0 },
            { q: "Une épreuve de Bernoulli n'a que :", options: ["1 issue", "2 issues", "3 issues"], correct: 1 },
            { q: "Sur TI, pour calculer \\( P(X=k) \\), on utilise :", options: ["binomFdp", "binomFrép", "normalFdp"], correct: 0 },
            { q: "L'espérance d'une loi binomiale est aussi appelée :", options: ["Écart-type", "Variance", "Moyenne"], correct: 2 },
            { q: "Si \\( P(A) = 0,2 \\), alors \\( P(\\bar{A}) \\) est :", options: ["0,8", "0,2", "-0,2"], correct: 0 }
        ];

        let current = 0; let score = 0;

        function loadQ() {
            const q = questions[current];
            document.getElementById('progress').innerText = `Question ${current + 1} / ${questions.length}`;
            document.getElementById('question-text').innerHTML = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('next-btn').style.display = 'none';

            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.innerHTML = opt;
                b.className = "btn-opt";
                b.onclick = () => {
                    if(i === q.correct) { 
                        score++; 
                        document.getElementById('feedback').innerText = "✅ Bien joué !";
                        document.getElementById('feedback').style.color = "#2ecc71";
                    } else { 
                        document.getElementById('feedback').innerText = "❌ Faux.";
                        document.getElementById('feedback').style.color = "#e74c3c";
                    }
                    Array.from(container.children).forEach(btn => btn.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                };
                container.appendChild(b);
            });
            if (window.MathJax) MathJax.typesetPromise();
        }

        document.getElementById('next-btn').onclick = () => {
            current++;
            if(current < questions.length) loadQ();
            else {
                document.getElementById('quiz-box').innerHTML = `<h2>Score Final : ${score} / ${questions.length}</h2><button onclick="location.reload()" class="btn">Recommencer</button>`;
            }
        };
        loadQ();
    </script>
</body>
</html>
